<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>なかむ | 手取り18万の簡単節約レシピ | Official Portal</title>
  <meta name="description" content="なかむの公式SNSリンク一覧。手取り18万の簡単節約レシピ、Instagram、TikTok、YouTube、楽天ROOMなどの最新コンテンツへアクセスできます。">
  
  <!-- SEO & Open Graph Meta Tags -->
  <meta property="og:title" content="なかむ | 手取り18万の簡単節約レシピ | Official Portal">
  <meta property="og:description" content="なかむの公式SNSリンク一覧。簡単節約レシピや最新コンテンツへはこちらから。">
  <meta property="og:image" content="avatar.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Reset & Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-color-overlay: rgba(242, 246, 247, 0.7); /* Semi-transparent cool overlay */
      --card-bg: #ffffff;
      --card-border: #d2dede;
      --text-primary: #082024;
      --text-secondary: #364f53;
      --font-english: 'Inter', sans-serif;
      --font-japanese: 'Noto Sans JP', sans-serif;
      --transition-soft: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    body {
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: var(--font-japanese);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    /* Container (Ultra-Transparent Glass Style) */
    .container {
      width: calc(100% - 32px);
      max-width: 390px;
      margin: 32px auto;
      padding: 36px 20px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(10, 45, 50, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    /* Header & Profile Section */
    header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .profile-avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 16px auto 0;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      transition: var(--transition-soft);
    }

    .profile-avatar-container:hover .profile-avatar {
      transform: scale(1.03);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }

    .profile-name {
      font-size: clamp(0.75rem, 4.3vw, 1.2rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
    }

    .profile-highlight-info {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-primary);
      margin-top: 16px;
      margin-bottom: 8px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards;
    }

    .profile-info {
      font-size: 0.75rem;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      margin-top: 24px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
    }

    .profile-info a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 600;
      transition: var(--transition-soft);
    }

    .profile-info a:hover {
      color: var(--text-primary);
    }

    /* Main Section: Large Buttons & Groups */
    main {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 36px;
    }

    .link-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .group-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      padding-left: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
    }
    
    /* Group title fade-in delays */
    .link-group:nth-child(1) .group-title {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.40s forwards;
    }
    .link-group:nth-child(2) .group-title {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.70s forwards;
    }

    .group-subtitle {
      font-size: 0.58rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: lowercase;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      text-decoration: none;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02), inset 0 1px 1px rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: var(--transition-soft);
      overflow: hidden;
      opacity: 0;
      transform: translateY(15px);
    }

    /* Animation delays for individual cards inside groups */
    .link-group:nth-child(1) .link-card:nth-child(2) { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.46s forwards; }
    .link-group:nth-child(1) .link-card:nth-child(3) { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.54s forwards; }
    .link-group:nth-child(1) .link-card:nth-child(4) { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.62s forwards; }
    .link-group:nth-child(2) .link-card:nth-child(2) { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.76s forwards; }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    /* Elastic tap feedback */
    .link-card:active {
      transform: scale(0.97);
      background: rgba(240, 244, 245, 0.9) !important;
      transition: transform 0.08s ease-out;
    }



    .link-icon {
      font-size: 1.3rem;
      width: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 14px;
      color: var(--text-secondary);
      transition: var(--transition-soft);
    }

    .link-text-group {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      text-align: left;
    }

    .link-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .link-subtitle {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-top: 3px;
      line-height: 1;
      text-transform: lowercase;
    }

    /* Platform Specific Styling (Soft/Dusty Pastel Tones on Hover) */
    /* Instagram */
    .link-instagram:hover {
      background: rgba(253, 245, 246, 0.75);
      border-color: rgba(245, 214, 218, 0.8);
    }
    .link-instagram:hover .link-icon {
      color: #e6683c;
      transform: scale(1.1) rotate(-8deg);
    }

    /* TikTok */
    .link-tiktok:hover {
      background: rgba(241, 248, 249, 0.75);
      border-color: rgba(210, 235, 235, 0.8);
    }
    .link-tiktok:hover .link-icon {
      color: #000000;
      transform: scale(1.1) translateY(-2px);
    }

    /* YouTube */
    .link-youtube:hover {
      background: rgba(255, 245, 245, 0.75);
      border-color: rgba(255, 210, 210, 0.8);
    }
    .link-youtube:hover .link-icon {
      color: #ff0000;
      transform: scale(1.15);
    }

    /* Rakuten ROOM */
    .link-rakuten:hover {
      background: rgba(255, 246, 243, 0.75);
      border-color: rgba(255, 216, 204, 0.8);
    }
    .link-rakuten:hover .link-icon {
      color: #d11e50;
      transform: scale(1.1) translateY(-2px);
    }
    .link-rakuten:hover .rakuten-roof {
      transform: translateY(-1.5px);
    }
    
    /* Rakuten ROOM Custom Icon Support */
    .rakuten-icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .rakuten-roof {
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Sub-Section: Mini Icons */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: auto;
      padding-top: 24px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.55s forwards;
      z-index: 10;
    }

    .social-icon-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(100, 90, 70, 0.02);
      transition: var(--transition-soft);
    }

    .social-icon-btn:hover {
      color: var(--text-primary);
      background: #ffffff;
      border-color: rgba(100, 90, 70, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(100, 90, 70, 0.05);
    }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      font-family: var(--font-english);
      font-size: 0.7rem;
      color: rgba(100, 90, 70, 0.5);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.7s;
    }

    /* Keyframes */
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* Custom Tap Effects & Mobile Optimization */
    @media (max-width: 480px) {
      .container {
        width: calc(100% - 24px);
        margin: 20px auto;
        padding: 24px 16px;
        border-radius: 18px;
      }
      
      .link-card {
        padding: 11px 16px;
        border-radius: 10px;
      }
      
      main {
        gap: 18px;
        margin-bottom: 24px;
      }

      .link-group {
        gap: 10px;
      }

      .group-title {
        margin-bottom: 2px;
      }

      header {
        margin-bottom: 20px;
      }

      .profile-avatar-container {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Profile Header -->
    <header>
      <h1 class="profile-name">なかむ | 手取り18万の簡単節約レシピ</h1>
      <div class="profile-avatar-container">
        <!-- avatar.png uses the cozy plant illustration -->
        <img class="profile-avatar" src="avatar.png" alt="Profile avatar of なかむ" width="100" height="100">

      <p class="profile-highlight-info">食費月1.5万で過ごすリアルを発信中</p>

    <main>

          <span class="link-icon"><i class="fa-brands fa-instagram"></i></span>

          <span class="link-icon"><i class="fa-brands fa-youtube"></i></span>

      <!-- 日用品 (楽天ROOM) -->
      <div class="link-group">
        <h2 class="group-title">日用品・愛用品 <span class="group-subtitle">daily goods</span></h2>

        <!-- Rakuten ROOM -->
        <a href="https://room.rakuten.co.jp/nakamu_recipelife/items" class="link-card link-rakuten" target="_blank" rel="noopener noreferrer" aria-label="楽天ROOMでなかむの愛用品をチェックする">
          <span class="link-icon">
            <!-- Custom Shop Icon (Lines matched with FontAwesome) -->
            <svg class="rakuten-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/>
              <path class="rakuten-roof" d="m3 9 2.44-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/>
              <path d="M12 3v6"/>

          </span>
          <div class="link-text-group">
            <span class="link-title">楽天ROOM</span>
            <span class="link-subtitle">my favorite items</span>
          </div>
        </a>
      </div>

    </main>

  </div>

  <script>
    // Track clicks on link cards for demonstration / analytics purposes
    document.querySelectorAll('.link-card').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const targetLabel = btn.getAttribute('aria-label') || btn.innerText.trim();
        console.log(`[Analytics] User navigated to: ${targetLabel}`);
      });
    });
  </script>
</body>
</html>
